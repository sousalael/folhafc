<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Gestão de Ponto</title>
    <style>.hidden { display: none !important; }</style>
</head>
<body class="bg-light p-3">
<div class="container" style="max-width: 600px; background: white; padding: 20px; border-radius: 10px;">
    
    <div id="view-login">
        <h4>Acesso Supervisor</h4>
        <select id="sel-proj" class="form-select mb-2"></select>
        <input type="number" id="cpf-sup" class="form-control mb-2" placeholder="Seu CPF">
        <button class="btn btn-primary w-100" onclick="entrar()">Entrar no Painel</button>
    </div>

    <div id="view-dashboard" class="hidden">
        <div class="alert alert-success">Projeto: <b id="span-projeto"></b></div>
        <input type="text" id="link-ponto" class="form-control mb-2" readonly>
        <h6>Colaboradores Presentes:</h6>
        <table class="table table-sm table-bordered">
            <thead><tr><th>Nome</th><th>Função</th><th>Obs</th><th>Salvar</th></tr></thead>
            <tbody id="lista-presentes-sup"></tbody>
        </table>
    </div>

    <div id="view-colaborador" class="hidden text-center">
        <h4>Registrar Presença</h4>
        <p id="info-projeto" class="text-primary"></p>
        <input type="number" id="cpf-colab" class="form-control mb-2" placeholder="Seu CPF">
        <button class="btn btn-success w-100" onclick="registrarPonto()">Confirmar Presença</button>
        <hr>
        <h6>Quem já registrou:</h6>
        <ul id="lista-colab-view" class="list-group list-group-flush"></ul>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwCHvR6IIqHI2wZmiTP3-YTw2J614J0AuNElLXVMjsgX2rxXXI5hxnQ3W8oG28k1Bb28w/exec'; 
    let projetoAtivo = null;

    window.onload = async () => {
        const params = new URLSearchParams(window.location.search);
        const projParam = params.get('projeto');
        if(projParam) {
            projetoAtivo = JSON.parse(decodeURIComponent(projParam));
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-colaborador').classList.remove('hidden');
            document.getElementById('info-projeto').innerText = `${projetoAtivo.cliente} - ${projetoAtivo.unidade}`;
            carregarLista(true);
            setInterval(() => carregarLista(true), 5000);
        } else {
            const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'getProjetos'})})).json();
            res.projetos.forEach(p => {
                let opt = document.createElement('option');
                opt.value = JSON.stringify(p);
                opt.text = `${p.data} | ${p.cliente} | ${p.unidade}`;
                document.getElementById('sel-proj').appendChild(opt);
            });
        }
    };

    async function entrar() {
        const cpf = document.getElementById('cpf-sup').value;
        if(!document.getElementById('sel-proj').value) return alert('Selecione um projeto');
        projetoAtivo = JSON.parse(document.getElementById('sel-proj').value);
        
        const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'verificarSupervisor', cpf:cpf})})).json();
        if(res.encontrado) {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-dashboard').classList.remove('hidden');
            document.getElementById('span-projeto').innerText = projetoAtivo.cliente;
            document.getElementById('link-ponto').value = window.location.origin + window.location.pathname + "?projeto=" + encodeURIComponent(JSON.stringify(projetoAtivo));
            carregarLista(false);
            setInterval(() => carregarLista(false), 5000); 
        } else { alert('Acesso Negado'); }
    }

    async function carregarLista(isColaborador) {
        const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'getListaPresencas', projeto:projetoAtivo})})).json();
        if(isColaborador) {
            const ul = document.getElementById('lista-colab-view');
            ul.innerHTML = res.lista.map(p => `<li class="list-group-item">${p.nome}</li>`).join('');
        } else {
            const tbody = document.getElementById('lista-presentes-sup');
            tbody.innerHTML = res.lista.map(p => `<tr><td>${p.nome}</td><td><input type="text" id="f-${p.rowId}" value="${p.funcao}" class="form-control form-control-sm"></td><td><input type="text" id="o-${p.rowId}" value="${p.obs}" class="form-control form-control-sm"></td><td><button class="btn btn-sm btn-primary" onclick="salvar(${p.rowId})">OK</button></td></tr>`).join('');
        }
    }

    async function salvar(rowId) {
        const f = document.getElementById('f-'+rowId).value;
        const o = document.getElementById('o-'+rowId).value;
        await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'atualizarPresenca', rowId, funcao:f, obs:o})});
    }

    async function registrarPonto() {
        const cpf = document.getElementById('cpf-colab').value;
        await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'registrarPonto', projeto:projetoAtivo, cpf:cpf})});
        carregarLista(true); // Atualiza instantaneamente ao clicar
    }
</script>
</body>
</html>
