<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Folha FC</title>
    <style>.hidden { display: none !important; }</style>
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 500px; background: white; padding: 20px; border-radius: 10px;">
    
    <div id="view-login">
        <h4>Tela do Supervisor</h4>
        <select id="sel-proj" class="form-select mb-2"></select>
        <input type="number" id="cpf-sup" class="form-control mb-2" placeholder="Seu CPF">
        <button class="btn btn-primary w-100" onclick="iniciarSessao()">Gerar Link de Ponto</button>
    </div>

    <div id="view-dashboard" class="hidden">
        <h5>Projeto: <span id="span-projeto" class="text-primary"></span></h5>
        <div class="alert alert-info mt-3">
            <label>Link para a Equipe:</label>
            <input type="text" id="link-ponto" class="form-control" readonly>
            <button class="btn btn-secondary btn-sm mt-2 w-100" onclick="copiarLink()">Copiar Link</button>
        </div>
        <h6>Colaboradores Presentes (<span id="contagem">0</span>):</h6>
        <ul id="lista-presentes" class="list-group"></ul>
    </div>

    <div id="view-colaborador" class="hidden text-center">
        <h4>Registro de Ponto</h4>
        <p id="info-proj-colab"></p>
        <input type="number" id="cpf-colab" class="form-control mb-2" placeholder="Digite seu CPF">
        <button class="btn btn-success w-100" onclick="registrarPonto()">Registrar Minha Presença</button>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwNnldZYJH_phGHq8a464-WjmvoxVP5u4D3n3PgFHHYbF1eDj7LnfL5a8cJHXxfucInQA/exec';
    let projetoAtivo = null;

    window.onload = async () => {
        const params = new URLSearchParams(window.location.search);
        const projBase64 = params.get('projeto');

        if (projBase64) {
            // Modo Colaborador
            projetoAtivo = JSON.parse(decodeURIComponent(projBase64));
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-colaborador').classList.remove('hidden');
            document.getElementById('info-proj-colab').innerText = `${projetoAtivo.cliente} - ${projetoAtivo.unidade}`;
        } else {
            // Modo Supervisor (Carregar projetos)
            const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'getProjetos'})})).json();
            const sel = document.getElementById('sel-proj');
            res.projetos.forEach(p => {
                let opt = document.createElement('option');
                opt.value = JSON.stringify(p);
                opt.text = `${p.cliente} - ${p.unidade}`;
                sel.appendChild(opt);
            });
        }
    };

    async function iniciarSessao() {
        const cpf = document.getElementById('cpf-sup').value;
        projetoAtivo = JSON.parse(document.getElementById('sel-proj').value);
        
        const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'verificarCPF', cpf:cpf})})).json();
        if(res.encontrado && res.perfil === 'Supervisor') {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-dashboard').classList.remove('hidden');
            document.getElementById('span-projeto').innerText = projetoAtivo.cliente;
            
            const link = window.location.origin + window.location.pathname + "?projeto=" + encodeURIComponent(JSON.stringify(projetoAtivo));
            document.getElementById('link-ponto').value = link;
            
            // Inicia atualização automática a cada 5 segundos
            setInterval(atualizarLista, 5000);
            atualizarLista();
        } else {
            alert('Acesso negado!');
        }
    }

    async function atualizarLista() {
        const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'getListaPresentes', projeto:projetoAtivo})})).json();
        const lista = document.getElementById('lista-presentes');
        document.getElementById('contagem').innerText = res.lista.length;
        lista.innerHTML = res.lista.map(p => `<li class="list-group-item">CPF: ${p.cpf} - ${p.hora}</li>`).join('');
    }

    async function registrarPonto() {
        const cpf = document.getElementById('cpf-colab').value;
        const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'registrarPonto', projeto:projetoAtivo, cpf:cpf})})).json();
        if(res.success) { alert('Presença registrada!'); }
    }

    function copiarLink() {
        document.getElementById('link-ponto').select();
        document.execCommand('copy');
        alert('Link copiado!');
    }
</script>
</body>
</html>
