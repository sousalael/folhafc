<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.hidden { display: none !important; }</style>
</head>
<body class="p-3 bg-light">
    <div id="app" class="container" style="max-width: 600px; background: white; padding: 20px; border-radius: 10px;">
        <div id="view-dashboard">
            <h4>Gestão de Projeto</h4>
            <div id="lista-presentes-sup"></div>
            <div class="mt-3 d-grid gap-2">
                <button class="btn btn-primary" onclick="salvarAlteracoes()">💾 Salvar Alterações</button>
                <button class="btn btn-danger" onclick="encerrarProjeto()">🔒 Encerrar Projeto</button>
                <button class="btn btn-secondary" onclick="exportarExcel()">📊 Gerar Excel</button>
            </div>
        </div>
    </div>

    <script>
        // --- COLE SUA URL ABAIXO (Sem aspas extras) ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbzsV0ChuBOi3J3Gfzy1e53XHWPxiBMrFCil0O7dZTyYyEXYFJ2Cn_XoL_h175wEhFIF1A/exec'; 
        // ----------------------------------------------

        // A função de exportação com colunas fixas:
        function exportarExcel() {
            const data = window.dadosAtuais; // Variável global preenchida pelo getListaPresencas
            const csv = [["Data", "Cliente", "Unidade", "CPF", "Nome Completo", "Chave Pix", "Nome Reduzido", "Função", "Observação"].join(";")];
            
            data.forEach(p => {
                let row = [
                    "DataFixa", "ClienteFixo", "UnidadeFixa", // Ajuste conforme necessário
                    p.cpf, p.nome, p.pix, p.nomeReduzido, p.funcao, p.obs
                ];
                csv.push(row.map(item => `"${String(item).replace(/"/g, '""')}"`).join(";"));
            });
            
            const blob = new Blob(["\ufeff" + csv.join("\n")], {type: "text/csv"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "Relatorio.csv"; a.click();
        }

        async function salvarAlteracoes() { /* Logica de fetch p/ salvarApenas */ }
        async function encerrarProjeto() { /* Logica de fetch p/ encerrarProjeto */ }
    </script>
</body>
</html>
