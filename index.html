<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Gestão Formula Code</title>
    <style>.hidden { display: none !important; }</style>
</head>
<body class="bg-light p-3">
<div class="container" style="max-width: 700px; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    
    <div id="view-login">
        <h4 class="mb-3 text-primary">Acesso Supervisor</h4>
        <label class="form-label fw-bold">Selecione o Projeto de Hoje:</label>
        <select id="sel-proj" class="form-select mb-3"></select>
        
        <label class="form-label fw-bold">CPF do Supervisor:</label>
        <input type="number" id="cpf-sup" class="form-control mb-3" placeholder="Digite apenas números">
        <button class="btn btn-primary w-100 py-2" onclick="entrar()">Entrar no Painel</button>
    </div>

    <div id="view-dashboard" class="hidden">
        <div class="alert alert-success">
            <h5 class="alert-heading">Painel de Gestão</h5>
            <hr>
            <p class="mb-1"><strong>Supervisor(a):</strong> <span id="span-nome-sup"></span></p>
            <p class="mb-0"><strong>Projeto:</strong> <span id="span-projeto"></span></p>
        </div>

        <div class="card mb-4 bg-light">
            <div class="card-body">
                <label class="fw-bold mb-2">Link de preenchimento dos colaboradores:</label>
                <div class="input-group">
                    <input type="text" id="link-ponto" class="form-control bg-white" readonly>
                    <button class="btn btn-primary" onclick="copiarLink()">Copiar Link</button>
                </div>
            </div>
        </div>

        <h6 class="fw-bold">Colaboradores Presentes:</h6>
        <div class="table-responsive">
            <table class="table table-sm table-bordered align-middle" id="tabela-presencas">
                <thead class="table-light">
                    <tr>
                        <th>Nome / CPF</th>
                        <th>Função</th>
                        <th>Observação</th>
                    </tr>
                </thead>
                <tbody id="lista-presentes-sup"></tbody>
            </table>
        </div>
        
        <div class="d-flex gap-2 mt-3">
            <button class="btn btn-success w-100" id="btn-salvar-lista" onclick="salvarTodaLista()">💾 Salvar Alterações</button>
            <button class="btn btn-secondary w-100" onclick="exportarExcel()">📊 Gerar Excel</button>
        </div>
    </div>

    <div id="view-colaborador" class="hidden text-center">
        <h4 class="mb-3 text-primary">Registrar Presença</h4>
        <p id="info-projeto-colab" class="fw-bold text-secondary mb-4"></p>
        
        <input type="number" id="cpf-colab" class="form-control form-control-lg mb-3" placeholder="Seu CPF (só números)">
        <button class="btn btn-success btn-lg w-100 mb-4" onclick="registrarPonto()">Confirmar Presença</button>
        
        <hr>
        
        <h6 class="text-start fw-bold mb-3">Colaboradores Presentes:</h6>
        <ul id="lista-colab-view" class="list-group list-group-flush text-start border rounded">
            </ul>
    </div>
</div>

<script>
    // === ATENÇÃO: COLE SUA URL DE DEPLOY AQUI ===
    const API_URL = 'https://script.google.com/macros/s/AKfycbwmMezMzcQX24EcqAYtmr4v73l52fLDDPrnwOIwetqqFoHU61GB7nXFJgujnppkUFAkDQ/exec'; 
    let projetoAtivo = null;

    window.onload = async () => {
        const params = new URLSearchParams(window.location.search);
        const projParam = params.get('projeto');
        
        if(projParam) {
            projetoAtivo = JSON.parse(decodeURIComponent(projParam));
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-colaborador').classList.remove('hidden');
            document.getElementById('info-projeto-colab').innerText = `${projetoAtivo.data} | ${projetoAtivo.cliente} - ${projetoAtivo.unidade}`;
            
            carregarLista(true);
            setInterval(() => carregarLista(true), 5000);
        } else {
            const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'getProjetos'})})).json();
            const sel = document.getElementById('sel-proj');
            res.projetos.forEach(p => {
                let opt = document.createElement('option');
                opt.value = JSON.stringify(p);
                opt.text = `${p.data} | ${p.cliente} | ${p.unidade}`;
                sel.appendChild(opt);
            });
        }
    };

    async function entrar() {
        const cpf = document.getElementById('cpf-sup').value;
        if(!document.getElementById('sel-proj').value) return alert('Selecione um projeto primeiro.');
        projetoAtivo = JSON.parse(document.getElementById('sel-proj').value);
        
        const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'verificarSupervisor', cpf:cpf})})).json();
        
        if(res.encontrado) {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-dashboard').classList.remove('hidden');
            
            document.getElementById('span-nome-sup').innerText = res.nome;
            document.getElementById('span-projeto').innerText = `${projetoAtivo.data} | ${projetoAtivo.cliente} - ${projetoAtivo.unidade}`;
            
            const linkGerado = window.location.origin + window.location.pathname + "?projeto=" + encodeURIComponent(JSON.stringify(projetoAtivo));
            document.getElementById('link-ponto').value = linkGerado;
            
            carregarLista(false);
            setInterval(() => carregarLista(false), 5000); 
        } else { 
            alert('Acesso Negado: CPF não encontrado ou sem permissão de Supervisor.'); 
        }
    }

    async function carregarLista(isColaborador) {
        // Bloqueia atualização automática se o supervisor estiver digitando uma observação ou escolhendo função
        if (!isColaborador && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT')) {
            return; 
        }

        const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'getListaPresencas', projeto:projetoAtivo})})).json();
        
        if(isColaborador) {
            // TELA DO COLABORADOR: Exibe o nome claramente
            const ul = document.getElementById('lista-colab-view');
            if(res.lista.length === 0) {
                ul.innerHTML = '<li class="list-group-item text-muted">Nenhum colaborador registrado ainda.</li>';
            } else {
                ul.innerHTML = res.lista.map(p => `<li class="list-group-item"><span class="text-success fw-bold">✓</span> ${p.nome}</li>`).join('');
            }
        } else {
            // TELA DO SUPERVISOR: Tabela com Nome e Lista Suspensa (Select) para Função
            const tbody = document.getElementById('lista-presentes-sup');
            if(res.lista.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">Aguardando registros da equipe...</td></tr>';
            } else {
                // Monta a tabela com o "select" em vez de "input" de texto
                tbody.innerHTML = res.lista.map(p => `
                    <tr data-rowid="${p.rowId}">
                        <td class="fw-bold">${p.nome}<br><small class="text-muted fw-normal">${p.cpf}</small></td>
                        <td>
                            <select id="f-${p.rowId}" class="form-select form-select-sm">
                                <option value="OPERACIONAL" ${p.funcao === 'OPERACIONAL' ? 'selected' : ''}>OPERACIONAL</option>
                                <option value="LÍDER" ${p.funcao === 'LÍDER' ? 'selected' : ''}>LÍDER</option>
                                <option value="APOIO" ${p.funcao === 'APOIO' ? 'selected' : ''}>APOIO</option>
                                <option value="SUPERVISOR" ${p.funcao === 'SUPERVISOR' ? 'selected' : ''}>SUPERVISOR</option>
                            </select>
                        </td>
                        <td><input type="text" id="o-${p.rowId}" value="${p.obs}" class="form-control form-control-sm" placeholder="Opcional"></td>
                    </tr>
                `).join('');
            }
        }
    }

    // NOVA FUNÇÃO: Salva a lista inteira de uma vez só
    async function salvarTodaLista() {
        const btn = document.getElementById('btn-salvar-lista');
        btn.innerText = "Salvando...";
        btn.disabled = true;

        const linhas = document.querySelectorAll('tbody#lista-presentes-sup tr');
        let listaParaSalvar = [];
        
        linhas.forEach(tr => {
            const rowId = tr.getAttribute('data-rowid');
            if(rowId) {
                const f = document.getElementById('f-'+rowId).value;
                const o = document.getElementById('o-'+rowId).value;
                listaParaSalvar.push({rowId: parseInt(rowId), funcao: f, obs: o});
            }
        });

        await fetch(API_URL, {
            method:'POST', 
            body: JSON.stringify({action:'salvarLista', lista: listaParaSalvar})
        });

        btn.innerText = "✓ Salvo com Sucesso!";
        btn.classList.replace('btn-success', 'btn-primary');
        setTimeout(() => { 
            btn.innerText = "💾 Salvar Alterações"; 
            btn.classList.replace('btn-primary', 'btn-success');
            btn.disabled = false; 
        }, 3000);
    }

    // NOVA FUNÇÃO: Gera um arquivo do Excel compatível com o sistema
    function exportarExcel() {
        let csv = [];
        let rows = document.querySelectorAll("#tabela-presencas tr");
        
        for (let i = 0; i < rows.length; i++) {
            let row = [];
            let cols = rows[i].querySelectorAll("td, th");
            
            for (let j = 0; j < cols.length; j++) {
                let data = cols[j].innerText;
                // Se a coluna tiver input ou select, pega o valor digitado/selecionado em vez do texto
                let input = cols[j].querySelector('input, select');
                if(input) { data = input.value; }
                
                // Limpa quebras de linha que possam bagunçar o Excel
                data = data.replace(/(\r\n|\n|\r)/gm, " - ");
                row.push('"' + data.replace(/"/g, '""') + '"');
            }
            // Usa ponto e vírgula para abrir corretamente no Excel em português
            csv.push(row.join(";")); 
        }

        let csvFile = new Blob(["\ufeff" + csv.join("\n")], {type: "text/csv;charset=utf-8;"});
        let downloadLink = document.createElement("a");
        downloadLink.download = `Presencas_${projetoAtivo.cliente}_${projetoAtivo.data.replace(/\//g, '-')}.csv`;
        downloadLink.href = window.URL.createObjectURL(csvFile);
        downloadLink.style.display = "none";
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
    }

    async function registrarPonto() {
        const cpfInput = document.getElementById('cpf-colab');
        const cpf = cpfInput.value;
        if(!cpf) return;

        cpfInput.value = '';
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "Registrando...";
        btn.disabled = true;

        await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'registrarPonto', projeto:projetoAtivo, cpf:cpf})});
        
        carregarLista(true);
        
        btn.innerText = "Presença Confirmada!";
        btn.classList.replace('btn-success', 'btn-primary');
        setTimeout(() => {
            btn.innerText = originalText;
            btn.classList.replace('btn-primary', 'btn-success');
            btn.disabled = false;
        }, 3000);
    }

    function copiarLink() { 
        const inputLink = document.getElementById('link-ponto');
        inputLink.select(); 
        inputLink.setSelectionRange(0, 99999);
        document.execCommand('copy'); 
        
        const btn = event.target;
        btn.innerText = "Copiado!";
        setTimeout(() => { btn.innerText = "Copiar Link"; }, 2000);
    }
</script>
</body>
</html>
