<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Folha FC</title>
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 500px; background: white; padding: 20px; border-radius: 10px;">
    <div id="app">
        <h4>Folha de Ponto</h4>
        <div id="login-supervisor">
            <select id="sel-proj" class="form-select mb-2"></select>
            <input type="number" id="cpf-sup" class="form-control mb-2" placeholder="Seu CPF (Supervisor)">
            <button class="btn btn-primary w-100" onclick="iniciarSessao()">Gerar Link de Ponto</button>
        </div>
        <div id="area-link" class="hidden mt-3 alert alert-success">
            Link para os colaboradores:<br><input type="text" id="link-ponto" class="form-control" readonly>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbz0f4eOvjZPmo9DFg7cAgKyw5YDwFUUZnuEoAX4Lq1wQN0Yx6AIItB9MY--be0BQ4QERw/exec';

    async function iniciarSessao() {
        const cpf = document.getElementById('cpf-sup').value;
        const proj = document.getElementById('sel-proj').value;
        const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'verificarCPF', cpf:cpf})})).json();
        
        if(res.encontrado && res.perfil === 'Supervisor') {
            const linkRes = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'iniciarSessao', projeto:proj})})).json();
            document.getElementById('area-link').classList.remove('hidden');
            document.getElementById('link-ponto').value = linkRes.link;
        } else {
            alert('CPF de Supervisor não localizado!');
        }
    }

    // Carregar projetos ao iniciar
    window.onload = async () => {
        const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'getProjetos'})})).json();
        const sel = document.getElementById('sel-proj');
        res.projetos.forEach(p => {
            let opt = document.createElement('option');
            opt.value = JSON.stringify(p);
            opt.text = p.cliente + " - " + p.unidade;
            sel.appendChild(opt);
        });
    };
</script>
</body>
</html>
