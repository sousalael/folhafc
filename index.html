<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Gestão Formula Code</title>
    <style>.hidden { display: none !important; }</style>
</head>
<body class="bg-light p-3">
<div class="container" style="max-width: 600px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">

    <div id="view-login">
        <h4 class="mb-4">Acesso Supervisor</h4>
        <select id="sel-proj" class="form-select mb-3"></select>
        <input type="number" id="cpf-sup" class="form-control mb-3" placeholder="Seu CPF">
        <button class="btn btn-primary w-100" onclick="loginSupervisor()">Entrar no Painel</button>
    </div>

    <div id="view-supervisor" class="hidden">
        <h4 id="titulo-projeto"></h4>
        <div class="alert alert-info">
            <strong>Link da equipe:</strong><br>
            <input type="text" id="link-gerado" class="form-control mb-2" readonly>
            <button class="btn btn-sm btn-outline-primary" onclick="copiarLink()">Copiar Link</button>
        </div>
        <hr>
        <h5>Equipe Presente: <span id="contador" class="badge bg-success">0</span></h5>
        <ul id="lista-equipe" class="list-group mb-3"></ul>
        <button class="btn btn-warning w-100" onclick="atualizarLista()">Atualizar Lista</button>
    </div>

    <div id="view-colaborador" class="hidden text-center">
        <h4>Registro de Ponto</h4>
        <p id="info-projeto"></p>
        <input type="number" id="cpf-colab" class="form-control mb-3" placeholder="Digite seu CPF">
        <button class="btn btn-success w-100" onclick="salvarPonto()">Registrar Presença</button>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzfCb8l99bx5EdeP2O6SUlShWRLcxvwyBJIt7cdoRZremw7Hs254PxBa2IUkGGtKJI5YA/exec';
    const params = new URLSearchParams(window.location.search);
    const projParam = params.get('proj');

    window.onload = async () => {
        if (projParam) {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-colaborador').classList.remove('hidden');
            document.getElementById('info-projeto').innerText = "Projeto: " + decodeURIComponent(projParam);
        } else {
            const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'getProjetos'})})).json();
            const sel = document.getElementById('sel-proj');
            res.projetos.forEach(p => {
                let opt = document.createElement('option');
                opt.value = `${p.cliente} - ${p.unidade}`;
                opt.text = `${p.cliente} - ${p.unidade}`;
                sel.appendChild(opt);
            });
        }
    };

    async function loginSupervisor() {
        const cpf = document.getElementById('cpf-sup').value;
        const proj = document.getElementById('sel-proj').value;
        const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'verificarCPF', cpf:cpf})})).json();
        
        if(res.encontrado && res.perfil === 'supervisor') {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-supervisor').classList.remove('hidden');
            document.getElementById('titulo-projeto').innerText = proj;
            document.getElementById('link-gerado').value = window.location.origin + window.location.pathname + "?proj=" + encodeURIComponent(proj);
            atualizarLista();
        } else {
            alert('Acesso negado.');
        }
    }

    async function atualizarLista() {
        const proj = document.getElementById('sel-proj').value;
        const [cli, uni] = proj.split(' - ');
        const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'getListaPresentes', cliente:cli, unidade:uni})})).json();
        
        const lista = document.getElementById('lista-equipe');
        lista.innerHTML = '';
        document.getElementById('contador').innerText = res.lista.length;
        res.lista.forEach(p => {
            lista.innerHTML += `<li class="list-group-item">CPF: ${p.cpf} <small class="text-muted">(${p.data})</small></li>`;
        });
    }

    async function salvarPonto() {
        const cpf = document.getElementById('cpf-colab').value;
        const [cli, uni] = decodeURIComponent(projParam).split(' - ');
        const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'registrarPonto', cpf:cpf, cliente:cli, unidade:uni})})).json();
        if(res.success) alert('Registrado!');
    }

    function copiarLink() {
        document.getElementById('link-gerado').select();
        document.execCommand('copy');
        alert('Link copiado!');
    }
</script>
</body>
</html>
