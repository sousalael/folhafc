<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Folha FC - Sistema</title>
</head>
<body class="bg-light p-3">
<div class="container" style="max-width: 500px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    
    <div id="view-supervisor">
        <h4 class="mb-4">Painel do Supervisor</h4>
        <select id="sel-proj" class="form-select mb-2"></select>
        <input type="number" id="cpf-sup" class="form-control mb-3" placeholder="Seu CPF (Supervisor)">
        <button class="btn btn-primary w-100" onclick="gerarLink()">Gerar Link de Ponto</button>
        <div id="resultado-link" class="mt-3 p-2 bg-light border hidden">
            <p>Envie este link para sua equipe:</p>
            <input type="text" id="link-gerado" class="form-control mb-2" readonly>
            <button class="btn btn-sm btn-success" onclick="copiarLink()">Copiar Link</button>
        </div>
    </div>

    <div id="view-colaborador" class="hidden text-center">
        <h4 class="mb-3">Registro de Ponto</h4>
        <p id="info-projeto" class="text-muted"></p>
        <input type="number" id="cpf-colab" class="form-control mb-3" placeholder="Digite seu CPF">
        <button class="btn btn-success w-100" onclick="salvarPonto()">Registrar Minha Presença</button>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxRq-UbAfIJfFwYVSwg4oiGNyNZNJAtyzdppSrPNx0eu8FqSnKWY7i-TzrKDcIR9q4JsA/exec';

    // Roteamento: Detectar se é link de projeto
    const urlParams = new URLSearchParams(window.location.search);
    const projetoParam = urlParams.get('proj');

    window.onload = async () => {
        if (projetoParam) {
            document.getElementById('view-supervisor').classList.add('hidden');
            document.getElementById('view-colaborador').classList.remove('hidden');
            document.getElementById('info-projeto').innerText = "Projeto: " + decodeURIComponent(projetoParam);
        } else {
            const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'getProjetos'})})).json();
            const sel = document.getElementById('sel-proj');
            res.projetos.forEach(p => {
                let opt = document.createElement('option');
                opt.value = `${p.cliente} - ${p.unidade}`;
                opt.text = `${p.cliente} - ${p.unidade}`;
                sel.appendChild(opt);
            });
        }
    };

    async function gerarLink() {
        const cpf = document.getElementById('cpf-sup').value;
        const proj = document.getElementById('sel-proj').value;
        const res = await (await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'verificarCPF', cpf:cpf})})).json();
        
        if(res.encontrado && res.perfil === 'Supervisor') {
            const link = window.location.origin + window.location.pathname + "?proj=" + encodeURIComponent(proj);
            document.getElementById('link-gerado').value = link;
            document.getElementById('resultado-link').classList.remove('hidden');
        } else {
            alert('CPF de Supervisor não localizado!');
        }
    }

    async function salvarPonto() {
        const cpf = document.getElementById('cpf-colab').value;
        const projInfo = decodeURIComponent(projetoParam).split(' - ');
        
        const res = await (await fetch(API_URL, {
            method:'POST', 
            body: JSON.stringify({
                action: 'registrarPonto', 
                cpf: cpf, 
                projeto: 'Hoje', 
                cliente: projInfo[0], 
                unidade: projInfo[1]
            })
        })).json();

        if(res.success) {
            alert('Ponto registrado com sucesso!');
        } else {
            alert('Erro ao salvar: ' + (res.error || 'Falha na conexão'));
        }
    }

    function copiarLink() {
        document.getElementById('link-gerado').select();
        document.execCommand('copy');
        alert('Link copiado!');
    }
</script>
<style>.hidden { display: none !important; }</style>
</body>
</html>
